<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Blue Agents Demo – Agente Virtual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bbva-navy:       #004481;
            --bbva-light-blue: #1173d4;
            --bbva-gray:       #F4F4F4;
            --bbva-border:     #DDE3EA;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #F4F4F4;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.10);
            position: relative;
        }

        /* ── Header ── */
        .chat-header {
            background: linear-gradient(135deg, #001e38 0%, var(--bbva-navy) 100%);
            padding: 16px 20px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .chat-header-back {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            color: #fff;
            opacity: 0.8;
        }
        .chat-header-back:hover { opacity: 1; }

        .chat-agent-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--bbva-light-blue), #00c9a7);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .agent-online-dot {
            width: 11px;
            height: 11px;
            background: #00c9a7;
            border-radius: 50%;
            border: 2px solid var(--bbva-navy);
            position: absolute;
            bottom: 1px;
            right: 1px;
        }

        .chat-agent-info { flex: 1; }
        .chat-agent-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin: 0 0 2px;
        }
        .chat-agent-status {
            font-size: 11px;
            color: rgba(255,255,255,0.65);
            margin: 0;
        }
        .chat-agent-status.online { color: #00c9a7; }

        .chat-header-logo {
            font-size: 16px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            opacity: 0.9;
        }

        /* ── Messages area ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        /* Date divider */
        .chat-date-divider {
            text-align: center;
            font-size: 11px;
            color: #aaa;
            margin: 6px 0;
            position: relative;
        }
        .chat-date-divider::before,
        .chat-date-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 28%;
            height: 1px;
            background: #ebebeb;
        }
        .chat-date-divider::before { left: 0; }
        .chat-date-divider::after  { right: 0; }

        /* Message row */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: msgIn 0.22s ease-out;
        }
        .msg-row.user { flex-direction: row-reverse; }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--bbva-light-blue), #00c9a7);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
        }
        .msg-row.user .msg-avatar {
            background: linear-gradient(135deg, #004481, #1173d4);
        }

        .msg-bubble {
            max-width: 72%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.55;
            word-break: break-word;
            position: relative;
        }

        /* Agent bubble */
        .msg-row.agent .msg-bubble {
            background: #F0F5FF;
            color: #1a2433;
            border-bottom-left-radius: 4px;
        }

        /* User bubble */
        .msg-row.user .msg-bubble {
            background: var(--bbva-navy);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 10px;
            opacity: 0.55;
            margin-top: 5px;
            display: block;
            text-align: right;
        }
        .msg-row.agent .msg-time { text-align: left; }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-items: flex-end;
            gap: 8px;
        }
        .typing-indicator.visible { display: flex; }

        .typing-dots {
            background: #F0F5FF;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            padding: 12px 16px;
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .typing-dots span {
            width: 7px;
            height: 7px;
            background: var(--bbva-light-blue);
            border-radius: 50%;
            opacity: 0.6;
            animation: typingDot 1.2s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingDot {
            0%, 80%, 100% { transform: scale(1);   opacity: 0.6; }
            40%            { transform: scale(1.3); opacity: 1;   }
        }

        /* ── Input bar ── */
        .chat-input-bar {
            padding: 12px 16px 20px;
            background: #fff;
            border-top: 1px solid #f0f0f0;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            flex-shrink: 0;
        }

        .chat-input-wrap {
            flex: 1;
            background: #F4F7FB;
            border: 1.5px solid var(--bbva-border);
            border-radius: 22px;
            display: flex;
            align-items: flex-end;
            padding: 10px 14px;
            transition: border-color 0.2s;
        }
        .chat-input-wrap:focus-within {
            border-color: var(--bbva-navy);
            background: #fff;
        }

        #chat-input {
            flex: 1;
            border: none;
            background: none;
            outline: none;
            font-family: inherit;
            font-size: 14px;
            color: #1a2433;
            resize: none;
            max-height: 100px;
            line-height: 1.5;
        }
        #chat-input::placeholder { color: #aab; }

        .chat-send-btn,
        .chat-voice-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        }

        .chat-send-btn {
            background: var(--bbva-navy);
            color: #fff;
        }
        .chat-send-btn:hover  { background: var(--bbva-light-blue); transform: scale(1.07); }
        .chat-send-btn:active { transform: scale(0.95); }
        .chat-send-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .chat-voice-btn {
            background: #F0F5FF;
            color: var(--bbva-navy);
        }
        .chat-voice-btn:hover  { background: #dce9ff; transform: scale(1.07); }
        .chat-voice-btn:active { transform: scale(0.95); }

        .chat-voice-btn.recording {
            background: #FFE8E8;
            color: #e53935;
            animation: pulseRecord 1s infinite;
        }
        @keyframes pulseRecord {
            0%, 100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.3); }
            50%       { box-shadow: 0 0 0 8px rgba(229,57,53,0); }
        }

        /* ── Quick suggestions ── */
        .chat-suggestions {
            display: flex;
            gap: 8px;
            padding: 0 16px 10px;
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .chat-suggestions::-webkit-scrollbar { display: none; }

        .suggestion-chip {
            white-space: nowrap;
            background: #F0F5FF;
            color: var(--bbva-navy);
            border: 1.5px solid #c5d9f5;
            border-radius: 20px;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.1s;
            font-family: inherit;
        }
        .suggestion-chip:hover  { background: #dce9ff; }
        .suggestion-chip:active { transform: scale(0.96); }

        /* ── Error toast ── */
        .chat-error-toast {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: #FFF0F0;
            border: 1px solid #e53935;
            color: #b71c1c;
            border-radius: 10px;
            padding: 9px 16px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 7px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 20;
            white-space: nowrap;
        }
        .chat-error-toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #dde3ea; border-radius: 2px; }

        /* ── Bot thinking animation ── */
        @keyframes botSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .chat-agent-avatar {
            overflow: visible; /* allow ring to extend outside */
        }

        .chat-agent-avatar::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(
                #00c9a7 0deg,
                var(--bbva-light-blue) 120deg,
                transparent 200deg,
                transparent 360deg
            );
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: -1;
        }

        .chat-agent-avatar.thinking::after {
            opacity: 1;
            animation: botSpin 1s linear infinite;
        }

        /* typing indicator avatar also spins */
        .msg-avatar {
            position: relative;
        }
        .msg-avatar.thinking::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(
                #00c9a7 0deg,
                var(--bbva-light-blue) 120deg,
                transparent 200deg,
                transparent 360deg
            );
            animation: botSpin 1s linear infinite;
            z-index: -1;
        }
    </style>
</head>
<body>
<div id="demo-banner" style="background:#f59e0b;color:#000;text-align:center;padding:6px 16px;font-size:11px;font-weight:600;position:fixed;top:0;left:0;right:0;width:100%;z-index:9999;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">⚠️ ENTORNO DE DEMOSTRACIÓN — No es la app oficial de BBVA Colombia</div>
<div id="app">

    <!-- Header -->
    <div class="chat-header">
        <button class="chat-header-back" onclick="history.back()" title="Volver">
            <i data-lucide="arrow-left" style="width:22px;height:22px;"></i>
        </button>
        <div class="chat-agent-avatar">
            <i data-lucide="bot" style="width:20px;height:20px;color:#fff;"></i>
            <span class="agent-online-dot"></span>
        </div>
        <div class="chat-agent-info">
            <p class="chat-agent-name">Agente BBVA</p>
            <p class="chat-agent-status online" id="agent-status">En línea · listo para ayudarte</p>
        </div>
        <span class="chat-header-logo">BBVA</span>
    </div>

    <!-- Error toast -->
    <div class="chat-error-toast" id="error-toast">
        <i data-lucide="wifi-off" style="width:15px;height:15px;flex-shrink:0;"></i>
        <span id="error-toast-msg">Error de conexión. Inténtalo de nuevo.</span>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
        <div class="chat-date-divider">Hoy</div>

        <!-- Greeting message -->
        <div class="msg-row agent">
            <div class="msg-avatar"><i data-lucide="bot" style="width:15px;height:15px;"></i></div>
            <div>
                <div class="msg-bubble">
                    ¡Hola! Soy el agente virtual de <strong>BBVA Colombia</strong>. ¿En qué puedo ayudarte hoy?
                </div>
                <span class="msg-time" id="greeting-time"></span>
            </div>
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator" id="typing-indicator">
            <div class="msg-avatar"><i data-lucide="bot" style="width:15px;height:15px;"></i></div>
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <!-- Quick suggestions -->
    <div class="chat-suggestions" id="suggestions">
        <button class="suggestion-chip" data-msg="¿Cuál es mi saldo actual?">💳 Ver saldo</button>
        <button class="suggestion-chip" data-msg="¿Cómo activo Pagos Inteligentes?">⚡ Pagos Inteligentes</button>
        <button class="suggestion-chip" data-msg="Quiero hacer una transferencia">🔄 Transferencias</button>
        <button class="suggestion-chip" data-msg="¿Cuáles son mis beneficios?">🎁 Beneficios</button>
        <button class="suggestion-chip" data-msg="Necesito hablar con un asesor">🧑‍💼 Asesor</button>
    </div>

    <!-- Input bar -->
    <div class="chat-input-bar">
        <div class="chat-input-wrap">
            <textarea
                id="chat-input"
                rows="1"
                placeholder="Escribe un mensaje..."
                maxlength="1000"
            ></textarea>
        </div>
        <button class="chat-voice-btn" id="voice-btn" title="Mensaje de voz">
            <i data-lucide="mic" style="width:20px;height:20px;"></i>
        </button>
        <button class="chat-send-btn" id="send-btn" title="Enviar" disabled>
            <i data-lucide="send" style="width:18px;height:18px;"></i>
        </button>
    </div>

</div>

<script>
    lucide.createIcons();

    const WEBHOOK_URL = 'https://ces-session-bridge-bla4v7hs7a-uc.a.run.app/chat';

    const messagesEl   = document.getElementById('chat-messages');
    const inputEl      = document.getElementById('chat-input');
    const sendBtn      = document.getElementById('send-btn');
    const voiceBtn     = document.getElementById('voice-btn');
    const typingEl     = document.getElementById('typing-indicator');
    const errorToast   = document.getElementById('error-toast');
    const errorMsg     = document.getElementById('error-toast-msg');
    const suggestionsEl = document.getElementById('suggestions');
    const agentStatus  = document.getElementById('agent-status');

    // Set greeting time
    document.getElementById('greeting-time').textContent = now();

    // ── Helpers ──────────────────────────────────────────────────────
    function now() {
        return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
    }

    function scrollBottom() {
        setTimeout(() => messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' }), 50);
    }

    function showError(msg) {
        errorMsg.textContent = msg;
        errorToast.classList.add('visible');
        setTimeout(() => errorToast.classList.remove('visible'), 3500);
        lucide.createIcons();
    }

    const headerAvatar   = document.querySelector('.chat-agent-avatar');
    const typingAvatar    = typingEl.querySelector('.msg-avatar');

    function setAgentBusy(busy) {
        agentStatus.textContent = busy ? 'Escribiendo…' : 'En línea · listo para ayudarte';
        agentStatus.classList.toggle('online', !busy);
        headerAvatar?.classList.toggle('thinking', busy);
        typingAvatar?.classList.toggle('thinking', busy);
    }

    // ── Auto-resize textarea ──────────────────────────────────────────
    inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
        sendBtn.disabled = inputEl.value.trim().length === 0;
    });

    inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (!sendBtn.disabled) sendMessage(inputEl.value.trim());
        }
    });

    // ── Add message bubble ────────────────────────────────────────────
    function addMessage(text, role, isMd = false) {
        const row = document.createElement('div');
        row.className = `msg-row ${role}`;

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        if (role === 'agent') {
            avatar.innerHTML = '<i data-lucide="bot" style="width:15px;height:15px;"></i>';
        } else {
            const initials = (localStorage.getItem('bbva_user') || 'Tú')
                .split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase() || 'TU';
            avatar.textContent = initials;
        }

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';

        // Render markdown-ish: bold, line breaks, bullet lists
        if (isMd) {
            bubble.innerHTML = renderMarkdown(text);
        } else {
            bubble.textContent = text;
        }

        const time = document.createElement('span');
        time.className = 'msg-time';
        time.textContent = now();
        bubble.appendChild(time);

        const wrap = document.createElement('div');
        wrap.appendChild(bubble);

        row.appendChild(avatar);
        row.appendChild(wrap);

        // Insert before typing indicator
        messagesEl.insertBefore(row, typingEl);
        lucide.createIcons();
        scrollBottom();
        return row;
    }

    function renderMarkdown(text) {
        return text
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/^[-•]\s(.+)$/gm, '<li>$1</li>')
            .replace(/(<li>.*<\/li>)/gs, '<ul style="margin:6px 0 0 16px;padding:0;">$1</ul>')
            .replace(/\n/g, '<br>');
    }

    // ── Send message ──────────────────────────────────────────────────
    async function sendMessage(text) {
        if (!text) return;

        // Hide suggestions after first real message
        suggestionsEl.style.display = 'none';

        // Add user bubble
        addMessage(text, 'user');

        // Clear input
        inputEl.value = '';
        inputEl.style.height = 'auto';
        sendBtn.disabled = true;

        // Show typing
        typingEl.classList.add('visible');
        setAgentBusy(true);
        scrollBottom();

        try {
            const payload = {
                message:   { text },
                userId:    localStorage.getItem('bbva_user_id')    || 'anonymous',
                userName:  localStorage.getItem('bbva_user')       || 'Usuario',
                cedula:    localStorage.getItem('bbva_user_id')    || '',
                sessionId: localStorage.getItem('bbva_fcm_token')  || '',
                timestamp: new Date().toISOString()
            };

            const res = await fetch(WEBHOOK_URL, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload)
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const data = await res.json();

            // Accept multiple response shapes
            const reply =
                data?.output     ||
                data?.message    ||
                data?.reply      ||
                data?.text       ||
                data?.response   ||
                (typeof data === 'string' ? data : null);

            typingEl.classList.remove('visible');
            setAgentBusy(false);

            if (reply) {
                addMessage(reply, 'agent', true);
            } else {
                addMessage('Disculpa, no pude procesar tu mensaje. ¿Puedes intentarlo de nuevo?', 'agent');
            }

        } catch (err) {
            typingEl.classList.remove('visible');
            setAgentBusy(false);
            console.error('[chat] Error:', err);
            showError('Sin conexión con el agente. Inténtalo de nuevo.');
            addMessage('Ocurrió un error de conexión. Por favor intenta de nuevo en unos segundos.', 'agent');
        }
    }

    // ── Send button ───────────────────────────────────────────────────
    sendBtn.addEventListener('click', () => {
        const text = inputEl.value.trim();
        if (text) sendMessage(text);
    });

    // ── Quick suggestion chips ────────────────────────────────────────
    suggestionsEl.querySelectorAll('.suggestion-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            sendMessage(chip.dataset.msg);
        });
    });

    // ── Voice input (Web Speech API) ──────────────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRecording = false;

    if (!SpeechRecognition) {
        voiceBtn.title = 'Voz no disponible en este navegador';
        voiceBtn.style.opacity = '0.4';
        voiceBtn.style.cursor  = 'not-allowed';
        voiceBtn.disabled       = true;
    } else {
        recognition = new SpeechRecognition();
        recognition.lang            = 'es-CO';
        recognition.continuous      = false;
        recognition.interimResults  = false;
        recognition.maxAlternatives = 1;

        recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript.trim();
            if (transcript) {
                inputEl.value = transcript;
                inputEl.dispatchEvent(new Event('input'));
            }
        };

        recognition.onerror = (e) => {
            console.warn('[speech]', e.error);
            if (e.error !== 'aborted') showError('No se pudo capturar el audio.');
        };

        recognition.onend = () => {
            isRecording = false;
            voiceBtn.classList.remove('recording');
            voiceBtn.innerHTML = '<i data-lucide="mic" style="width:20px;height:20px;"></i>';
            lucide.createIcons();
            // Auto-send if there's text
            if (inputEl.value.trim()) sendMessage(inputEl.value.trim());
        };

        voiceBtn.addEventListener('click', () => {
            if (isRecording) {
                recognition.stop();
            } else {
                isRecording = true;
                voiceBtn.classList.add('recording');
                voiceBtn.innerHTML = '<i data-lucide="square" style="width:18px;height:18px;"></i>';
                lucide.createIcons();
                recognition.start();
            }
        });
    }
</script>
</body>
</html>
